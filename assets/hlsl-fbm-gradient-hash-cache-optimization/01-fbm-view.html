<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unity Shader 逻辑模拟 - 岩石法线扰动</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0a0a0a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: white; }
        #canvas-container { width: 100vw; height: 100vh; }
        #gui {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(20, 20, 20, 0.85);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 260px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .control-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; color: #888; }
        input[type="range"] { width: 100%; height: 4px; background: #333; border-radius: 2px; appearance: none; outline: none; }
        input[type="range"]::-webkit-slider-thumb { appearance: none; width: 14px; height: 14px; background: #00ffcc; border-radius: 50%; cursor: pointer; }
        .val { float: right; color: #00ffcc; font-family: monospace; font-size: 12px; }
        h2 { margin: 0 0 20px 0; font-size: 16px; font-weight: 300; border-bottom: 1px solid #333; padding-bottom: 10px; }
    </style>
</head>
<body>

    <div id="gui">
        <h2>Unity Shader 逻辑调试</h2>
        <div class="control-group">
            <label>扰动强度 (_Distortion) <span id="v_dist" class="val">0.50</span></label>
            <input type="range" id="i_dist" min="0.0" max="2.0" step="0.01" value="0.5">
        </div>
        <div class="control-group">
            <label>噪声粗糙度 (_NormalScale) <span id="v_scale" class="val">5.0</span></label>
            <input type="range" id="i_scale" min="1.0" max="20.0" step="0.5" value="5.0">
        </div>
        <div class="control-group">
            <label>细节频率 (_Frequency) <span id="v_freq" class="val">4.0</span></label>
            <input type="range" id="i_freq" min="1.0" max="10.0" step="0.1" value="4.0">
        </div>
        <div class="control-group">
            <label>反射强度 (_Reflectivity) <span id="v_ref" class="val">0.30</span></label>
            <input type="range" id="i_ref" min="0.0" max="1.0" step="0.01" value="0.3">
        </div>
        <div class="control-group">
            <label>菲涅尔系数 (_FresnelPower) <span id="v_fres" class="val">4.0</span></label>
            <input type="range" id="i_fres" min="1.0" max="8.0" step="0.1" value="4.0">
        </div>
    </div>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script id="vertexShader" type="x-shader/x-vertex">
        varying vec3 vPositionOS; 
        varying vec3 vNormalWS;   
        varying vec3 vPositionWS; 
        varying mat3 vNormalMatrix;

        void main() {
            vPositionOS = position;
            vec4 worldPos = modelMatrix * vec4(position, 1.0);
            vPositionWS = worldPos.xyz;
            vNormalWS = normalize(normalMatrix * normal);
            vNormalMatrix = normalMatrix;
            gl_Position = projectionMatrix * viewMatrix * worldPos;
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        precision highp float;
        
        varying vec3 vPositionOS;
        varying vec3 vNormalWS;
        varying vec3 vPositionWS;
        varying mat3 vNormalMatrix;

        uniform vec3 uCameraPos;
        uniform vec3 uBaseColor;
        uniform float uFrequency;
        uniform float uNormalScale;
        uniform float uDistortion;
        uniform float uReflectivity;
        uniform float uFresnelPower;

        // 辅助函数定义必须在调用之前
        float saturate(float x) { return clamp(x, 0.0, 1.0); }

        float hash3(vec3 p) {
            return fract(sin(dot(p, vec3(12.71, 311.7, 74.7))) * 43758.5453123);
        }

        float noise3D(vec3 p) {
            vec3 i = floor(p);
            vec3 f = fract(p);
            f = f * f * (3.0 - 2.0 * f);

            float n000 = hash3(i + vec3(0,0,0));
            float n100 = hash3(i + vec3(1,0,0));
            float n010 = hash3(i + vec3(0,1,0));
            float n110 = hash3(i + vec3(1,1,0));
            float n001 = hash3(i + vec3(0,0,1));
            float n101 = hash3(i + vec3(1,0,1));
            float n011 = hash3(i + vec3(0,1,1));
            float n111 = hash3(i + vec3(1,1,1));

            return mix(
                mix(mix(n000, n100, f.x), mix(n010, n110, f.x), f.y),
                mix(mix(n001, n101, f.x), mix(n011, n111, f.x), f.y),
                f.z
            );
        }

        float simpleRockNoise(vec3 p) {
            float n = 0.6 * noise3D(p);
            n += 0.4 * noise3D(p * 2.5 + vec3(0.5, 0.2, 0.1));
            return n;
        }

        vec3 getSimpleGradient(vec3 p) {
            float e = 0.02;
            float val = simpleRockNoise(p);
            float dx = simpleRockNoise(p + vec3(e, 0.0, 0.0)) - val;
            float dy = simpleRockNoise(p + vec3(0.0, e, 0.0)) - val;
            float dz = simpleRockNoise(p + vec3(0.0, 0.0, e)) - val;
            return vec3(dx, dy, dz) / e;
        }

        void main() {
            vec3 noiseInput = vPositionOS * uFrequency;
            vec3 gradOS = getSimpleGradient(noiseInput);
            vec3 gradWS = vNormalMatrix * gradOS;
            
            vec3 perturbedNormal = vNormalWS + gradWS * uDistortion * uNormalScale * 0.1;
            vec3 normalWS = normalize(perturbedNormal);

            vec3 viewDirWS = normalize(uCameraPos - vPositionWS);
            vec3 lightDir = normalize(vec3(1.0, 1.0, 1.0));
            float diffuse = max(0.0, dot(normalWS, lightDir));
            
            float fresnel = pow(1.0 - max(0.0, dot(normalWS, viewDirWS)), uFresnelPower);
            
            vec3 reflectDir = reflect(-viewDirWS, normalWS);
            vec3 skyColor = mix(vec3(0.05, 0.05, 0.1), vec3(0.2, 0.25, 0.35), saturate(normalWS.y * 0.5 + 0.5));
            
            vec3 finalColor = mix(uBaseColor * (diffuse + 0.1), skyColor, uReflectivity + fresnel * 0.4);

            gl_FragColor = vec4(finalColor, 1.0);
        }
    </script>

    <script>
        let scene, camera, renderer, material, sphere;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const uniforms = {
                uCameraPos: { value: camera.position },
                uBaseColor: { value: new THREE.Color(0.12, 0.12, 0.13) },
                uFrequency: { value: 4.0 },
                uNormalScale: { value: 5.0 },
                uDistortion: { value: 0.5 },
                uReflectivity: { value: 0.3 },
                uFresnelPower: { value: 4.0 }
            };

            material = new THREE.ShaderMaterial({
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                uniforms: uniforms
            });

            sphere = new THREE.Mesh(new THREE.SphereGeometry(1.5, 128, 128), material);
            scene.add(sphere);

            bindUI('i_dist', 'v_dist', 'uDistortion');
            bindUI('i_scale', 'v_scale', 'uNormalScale');
            bindUI('i_freq', 'v_freq', 'uFrequency');
            bindUI('i_ref', 'v_ref', 'uReflectivity');
            bindUI('i_fres', 'v_fres', 'uFresnelPower');

            window.addEventListener('resize', onWindowResize);
        }

        function bindUI(inputId, valId, uniformKey) {
            const input = document.getElementById(inputId);
            input.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                document.getElementById(valId).innerText = val.toFixed(2);
                material.uniforms[uniformKey].value = val;
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            sphere.rotation.y += 0.005;
            sphere.rotation.x += 0.002;
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
